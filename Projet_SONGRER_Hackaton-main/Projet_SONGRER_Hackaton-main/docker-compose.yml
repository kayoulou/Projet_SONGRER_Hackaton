services:
  postgres:
    image: postgres:16-alpine
    container_name: songrer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: songrer
      POSTGRES_PASSWORD: songrer_password
      POSTGRES_DB: songrer
    ports:
      - "5432:5432"
    volumes:
      - songrer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U songrer -d songrer"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./songrer-api
    container_name: songrer-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./songrer-api/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:8081,http://localhost:19006,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3002
      LLM_PROVIDER: gemini
      GEMINI_MODEL: gemini-2.5-flash-lite
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node src/server.js"

volumes:
  songrer_postgres_data:
